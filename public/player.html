<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<!-- loading screen: renders immediately before any JS or external resources -->
<style>html,body{margin:0;background:#000;}#boot{position:fixed;inset:0;background:#000;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:0 32px;}#boot .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.18);border-top-color:#fff;border-radius:50%;animation:bootspin .8s linear infinite;}#bootMsg{color:rgba(255,255,255,.72);font:500 14px/1.5 -apple-system,system-ui,sans-serif;text-align:center;letter-spacing:.02em;max-width:300px;}@keyframes bootspin{to{transform:rotate(360deg)}}</style>
<title>Crowd Canvas</title>
<style>
  /* --bg fixed black + white text on purpose; only the buttons are themeable.
     --ink = drawing brush (stays black on white --paper). */
  :root { --ink: #000; --paper: #fff; --bg: #000; --send: #e0512f; --btn-clear: #444; --btn-next: #1f6feb; }
  *, *::before, *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;          /* prevent double-tap and pinch zoom on every element */
    -webkit-user-select: none;   /* prevent text-selection zoom on iOS Safari */
    user-select: none;
  }
  html, body { margin: 0; height: 100%; overflow: hidden; background: var(--bg);
    font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif;
    overscroll-behavior: none; /* Android: disables pull-to-refresh and overscroll bounce */ }
  body { display: flex; justify-content: center; }
  main {
    width: 100%; max-width: 520px; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 8px; gap: 8px;
  }
  main.centered {
    justify-content: center;
  }
  .card { border: none; display: inline-block; flex-shrink: 0; position: relative; }
  #drawCard { box-shadow: 0 0 0 2px #555; }
  .canvas-stack { position: relative; display: block; }
  .canvas-stack canvas { position: absolute; top: 0; left: 0; display: block; }
  #paper { z-index: 1; }
  #ref { display: block; }
  #hint {
    margin: 6px 0 4px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .1em; color: #fff; opacity: .7; text-align: center;
  }
  #ghost {
    position: absolute;
    /* width/height/left/top set in JS to match the tile zone exactly —
       keeps the ghost out of the grey bleed zone on all sides */
    background-repeat: no-repeat;
    background-size: 100% 100%;
    opacity: 0; pointer-events: none; z-index: 2;
    transition: opacity 0.35s ease;
    will-change: opacity;
  }
  #draw { z-index: 3; }
  .buttons { display: flex; gap: 6px; flex-shrink: 0; }
  .btn {
    flex: 1; padding: 13px 8px; border: 2px solid transparent; border-radius: 0;
    background: #444; color: #fff; cursor: pointer;
    font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em;
  }
  #clearBtn { background: var(--btn-clear); border-color: var(--btn-clear); }
  #nextBtn  { background: var(--btn-next);  border-color: var(--btn-next); }
  .btn:active { opacity: .75; }
  .btn:disabled { opacity: .35; pointer-events: none; }
  /* New-piece cooldown: grey at start, ink colour fills left-to-right over 8 s */
  @keyframes next-cooldown {
    from { background-position: 100% 0; }
    to   { background-position:   0% 0; }
  }
  #nextBtn.cooling {
    background-image: linear-gradient(to right, var(--btn-next) 50%, #888 50%);
    background-size: 200% 100%;
    background-position: 100% 0;
    animation: next-cooldown 5s linear forwards;
  }
  #submitBtn { background: var(--send); border-color: var(--send); }
  #waiting-screen, #done {
    position: fixed; inset: 0; background: #000; color: #fff;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 32px; gap: 16px; z-index: 50;
  }
  #waiting-screen.show, #done.show { display: flex; }
  #waiting-screen h2, #done h2 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -.01em; }
  #waiting-screen p,  #done p  { margin: 0; font-size: 14px; opacity: .6; line-height: 1.6; }
  #waiting-screen .wait-count { font-size: 46px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  #waiting-screen .wait-count:empty { display: none; }
  #quoteBox { margin: 22px 0 0; max-width: 340px; min-height: 76px; }
  #quoteText { margin: 0; font-size: 17px; font-style: italic; font-weight: 500; line-height: 1.5; opacity: .92; }
  #quoteAuthor { margin: 10px 0 0; font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; opacity: .5; transition: opacity .4s; }
  #quoteAuthor:empty { display: none; }
  #finalLink {
    display: block; width: min(78vw, 320px); color: #fff; text-decoration: none;
  }
  #finalThumb {
    width: 100%; aspect-ratio: 1 / 1; object-fit: contain; display: block;
    border: 2px solid rgba(255,255,255,.65); background: #000;
  }
  #finalLink span {
    display: block; margin-top: 8px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .08em; opacity: .75;
  }
  #resultFlash {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
    color: #fff; opacity: 0; pointer-events: none;
    transition: opacity 0.15s; z-index: 30; border-radius: inherit;
  }
  #resultFlash .rf-icon { font-size: 56px; line-height: 1; }
  #resultFlash .rf-pct  { font-size: 22px; font-weight: 700; font-family: system-ui, sans-serif; opacity: .92; }
  #resultFlash .rf-label{ font-size: 12px; font-weight: 800; font-family: system-ui, sans-serif; text-transform: uppercase; letter-spacing: .08em; opacity: .95; }
  #resultFlash.ok   { background: rgba(34,197,94,0.88); opacity: 1; }
  #resultFlash.fail { background: rgba(239,68,68,0.88);  opacity: 1; }
  #retrievingOverlay {
    position: absolute; inset: 0; z-index: 25; border-radius: inherit;
    background: rgba(120,120,120,0.72);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-family: system-ui, sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    pointer-events: none;
  }
  #retrievingOverlay.hidden { display: none; }
  #rateLimitOverlay {
    position: absolute; inset: 0; z-index: 26; border-radius: inherit;
    background: rgba(0,0,0,0.72);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: #fff; font-family: system-ui, sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    pointer-events: none;
  }
  #rateLimitOverlay.show { display: flex; }
  #rateLimitOverlay .rl-count { font-size: 48px; font-weight: 800; line-height: 1; }
  #refCard.dim { opacity: 0.35; }
  .pulse { width: 12px; height: 12px; border-radius: 50%; background: var(--send);
    animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: rgba(0,0,0,0.88); color: #fff;
    padding: 12px 20px; border-radius: 32px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px; font-weight: 700; letter-spacing: .01em;
    text-align: center; white-space: normal;
    max-width: min(82vw, 340px);
    opacity: 0; transition: opacity .22s, transform .22s; pointer-events: none;
    box-shadow: 0 4px 20px rgba(0,0,0,.35);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="boot"><div class="spin"></div><div id="bootMsg">Connecting…</div></div>
<main id="main">
  <div class="card" id="refCard"><canvas id="ref"></canvas></div>
  <p id="hint">✏️ Copy this image on the canvas below</p>
  <div class="card" id="drawCard">
    <div id="resultFlash"></div>
    <div id="retrievingOverlay">⟳ Retrieving tile…</div>
    <div id="rateLimitOverlay"><span>Next piece in…</span><span class="rl-count" id="rateLimitCount"></span></div>
    <div class="canvas-stack" id="drawStack">
      <canvas id="paper"></canvas>
      <div id="ghost"></div>
      <canvas id="draw"></canvas>
    </div>
  </div>
  <div class="buttons" id="buttons">
    <button class="btn" id="clearBtn">Clear</button>
    <button class="btn" id="nextBtn">New piece</button>
    <button class="btn" id="submitBtn">Send →</button>
  </div>
</main>
<div id="toast"></div>
<div id="waiting-screen">
  <div class="pulse"></div>
  <h2 id="waitingTitle">Get ready!</h2>
  <p id="waitingMsg">The game starts soon.<br>Keep this screen open.</p>
  <div id="waitCount" class="wait-count"></div>
  <figure id="quoteBox">
    <blockquote id="quoteText"></blockquote>
    <figcaption id="quoteAuthor"></figcaption>
  </figure>
</div>
<div id="done">
  <h2>Thank you!</h2>
  <p>The final mosaic is ready.<br>Tap it to download the full version.</p>
  <!-- No src/href here on purpose: /api/export-thumb.png and /api/export.png are
       expensive Node-built images. A hardcoded src made EVERY player page-load fetch
       the thumbnail (~16s under load → competes with WS handling on Node's thread and
       made joins feel slow). loadDoneThumb() sets both only when the game is done. -->
  <a id="finalLink" download="crowd-canvas.png">
    <img id="finalThumb" alt="Final mosaic">
    <span>Download full image</span>
  </a>
</div>

<script>
let INK = '#000000', PAPER = '#ffffff', SEND = '#e0512f';
let simThreshold = 0.35;
let maxStrayInk = 1.5;
let minCoverage = 0.60;
let rateLimit = 10;
let ghostMode = 'attempt';
let tileReceivedAt = 0;
let similarityRetries = 0; // resets to 0 on each new tile
let dpr = 1, tileSide = 0, drawSide = 0, bleedPx = 0;
let tileId = null, drawing = false, pts = [];

let rateLimitTimer = null;

function maybeShowRateLimit() {
  if (!rateLimit) return false;
  const elapsed = Date.now() - tileReceivedAt;
  const remaining = Math.ceil((rateLimit * 1000 - elapsed) / 1000);
  if (remaining > 0) {
    showWait('Easy there!', 'Lining up your next piece…', remaining,
      () => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' })); });
    return true;
  }
  return false;
}

function showRateLimit(seconds) {
  const overlay = document.getElementById('rateLimitOverlay');
  const count   = document.getElementById('rateLimitCount');
  let remaining = seconds;
  count.textContent = remaining;
  overlay.classList.add('show');
  setBusy(true);
  if (rateLimitTimer) clearInterval(rateLimitTimer);
  rateLimitTimer = setInterval(() => {
    remaining--;
    if (remaining > 0) {
      count.textContent = remaining;
    } else {
      clearInterval(rateLimitTimer);
      rateLimitTimer = null;
      overlay.classList.remove('show');
      setBusy(false);
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' }));
    }
  }, 1000);
}
let curRef = null;

const refCard  = document.getElementById('refCard');
const drawCard = document.getElementById('drawCard');
const drawStack = document.getElementById('drawStack');
const refC  = document.getElementById('ref');
const paperC = document.getElementById('paper');
const drawC  = document.getElementById('draw');
const rctx  = refC.getContext('2d');
const pctx  = paperC.getContext('2d');
const ctx   = drawC.getContext('2d');

// ── sizing ────────────────────────────────────────────────────────────────────
function setup() {
  dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 3));
  const mainEl  = document.getElementById('main');
  const btnsEl  = document.getElementById('buttons');
  const mainH   = mainEl.getBoundingClientRect().height;
  const mainW   = mainEl.getBoundingClientRect().width;
  const btnsH   = btnsEl.offsetHeight || 46;
  const PAD = 8, GAPS = 8 * 3; // 3 gaps (top of ref, between cards, between draw and buttons)
  const availH  = mainH - btnsH - GAPS - PAD * 2;
  const availW  = mainW - PAD * 2;

  // constraints: tileSide * 1.2 ≤ availW  AND  tileSide * 2.2 ≤ availH
  tileSide = Math.floor(Math.min(availW / 1.2, availH / 2.2));
  drawSide = Math.floor(tileSide * 1.2);

  // ref canvas = tile size
  setCanvas(refC,   rctx,  tileSide, tileSide);
  refCard.style.width  = tileSide + 'px';
  refCard.style.height = tileSide + 'px';

  // draw canvases = draw size (tile + bleed)
  setCanvas(paperC, pctx, drawSide, drawSide);
  setCanvas(drawC,  ctx,  drawSide, drawSide);
  drawStack.style.width  = drawSide + 'px';
  drawStack.style.height = drawSide + 'px';
  drawCard.style.width  = drawSide + 'px';
  drawCard.style.height = drawSide + 'px';

  // buttons match draw card width
  document.getElementById('buttons').style.width = drawSide + 'px';

  // bleedPx in CSS px — the offset from draw canvas edge to tile zone start
  bleedPx = (drawSide - tileSide) / 2; // = tileSide * 0.1

  // Ghost is sized and positioned to cover only the inner tile zone — not the bleed area.
  // This prevents the reference image from visually bleeding into the grey border.
  const ghost = document.getElementById('ghost');
  ghost.style.width  = tileSide + 'px';
  ghost.style.height = tileSide + 'px';
  ghost.style.left   = bleedPx  + 'px';
  ghost.style.top    = bleedPx  + 'px';
  ghost.style.backgroundSize     = '100% 100%';
  ghost.style.backgroundPosition = '0 0';

  paintPaper();
  if (curRef) drawRef(curRef);
}

function setCanvas(c, g, w, h) {
  c.width  = Math.round(w * dpr);
  c.height = Math.round(h * dpr);
  c.style.width  = w + 'px';
  c.style.height = h + 'px';
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── paper layer: bleed zone + tile zone + tile border ────────────────────────
function paintPaper() {
  // whole canvas = bleed zone (gray)
  pctx.fillStyle = '#b8b8b8';
  pctx.fillRect(0, 0, drawSide, drawSide);
  // inner tile zone = paper
  pctx.fillStyle = PAPER;
  pctx.fillRect(bleedPx, bleedPx, tileSide, tileSide);
  // explicit tile boundary
  pctx.strokeStyle = INK;
  pctx.lineWidth = 2;
  pctx.strokeRect(bleedPx, bleedPx, tileSide, tileSide);
}

function drawRef(img) {
  rctx.fillStyle = PAPER;
  rctx.fillRect(0, 0, tileSide, tileSide);
  rctx.drawImage(img, 0, 0, tileSide, tileSide);
}

function clearDraw() {
  ctx.clearRect(0, 0, drawSide, drawSide);
}

// ── drawing ───────────────────────────────────────────────────────────────────
const mid = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
function brushW() { return drawSide * (1 / 12) * 0.6; } // ~5mm equiv relative to drawSide
function pos(e) {
  const r = drawC.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function strokeSetup() {
  ctx.strokeStyle = INK; ctx.fillStyle = INK;
  ctx.lineWidth = brushW(); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}
drawC.addEventListener('pointerdown', e => {
  if (!tileId) return; // no tile yet — ignore
  e.preventDefault(); drawC.setPointerCapture(e.pointerId);
  drawing = true; strokeSetup(); const p = pos(e); pts = [p];
  ctx.beginPath(); ctx.arc(p.x, p.y, brushW() / 2, 0, 7); ctx.fill();
});
drawC.addEventListener('pointermove', e => {
  if (!drawing) return; e.preventDefault();
  const p = pos(e); pts.push(p);
  if (pts.length >= 3) {
    const n = pts.length, p1 = pts[n-2], p2 = pts[n-1];
    const m1 = mid(pts[n-3], p1), m2 = mid(p1, p2);
    ctx.beginPath(); ctx.moveTo(m1.x, m1.y); ctx.quadraticCurveTo(p1.x, p1.y, m2.x, m2.y); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); ctx.lineTo(p.x, p.y); ctx.stroke();
  }
});
['pointerup','pointercancel','pointerleave'].forEach(ev =>
  drawC.addEventListener(ev, () => drawing = false));

// ── submit: crop inner tile zone, always at 256×256 ──────────────────────────
// Submitting at device resolution (up to 660×660 on dpr=3 phones) wastes
// bandwidth and DB space — the server resizes to 256×256 anyway for blending.
// Doing the resize here saves ~5–8× payload per submission (150 KB → 25 KB).
function buildSubmitCanvas() {
  const tileDev  = Math.round(tileSide * dpr);
  const bleedDev = Math.floor((paperC.width - tileDev) / 2);
  const OUT = 256; // server always works at 256×256
  const flat = document.createElement('canvas');
  flat.width = OUT; flat.height = OUT;
  const fc = flat.getContext('2d');
  fc.fillStyle = PAPER;
  fc.fillRect(0, 0, OUT, OUT);
  // draw only the inner tile zone (crop out bleed), scaled down to 256×256
  fc.drawImage(drawC, bleedDev, bleedDev, tileDev, tileDev, 0, 0, OUT, OUT);
  return flat;
}

// ── networking ────────────────────────────────────────────────────────────────
let ws, connectWatchdog = null, reconnectAttempts = 0;

// ── nerdy load screen: quotes + deliberate first-tile delay ───────────────────
let quotes = [];
fetch('/api/quotes').then(r => r.json()).then(q => { if (Array.isArray(q)) quotes = q; }).catch(() => {});
let waitTimer = null;          // countdown interval for the wait screen
let quoteTimer = null;         // word-by-word reveal interval
let connectStart = 0;          // when this connection began (for the deliberate delay)
let firstTile = true;          // first tile of this connection gets the deliberate hold
let pendingTile = null;        // tile held behind the load screen during the delay
let startedDrawing = false;    // once the first piece is shown, no more quotes (only at the start)

// A reload/first-join must never beat the normal in-game pace, even when the
// server is idle: total time from connect to first tile is held to ≥ this.
// `rateLimit` (seconds between pieces, set from config below) is reused here.
function deliberateMs() { return Math.max(5000, (rateLimit || 0) * 1000); }

function paintQuote() {
  const tEl = document.getElementById('quoteText'), aEl = document.getElementById('quoteAuthor');
  if (!tEl) return;
  clearInterval(quoteTimer); quoteTimer = null;
  tEl.textContent = ''; aEl.textContent = ''; aEl.style.opacity = '0';
  if (startedDrawing || !quotes.length) return; // quotes only before the first piece, not mid-game
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  const words = ('“' + q.text + '”').split(' ');
  let i = 0;
  quoteTimer = setInterval(() => {          // reveal ~5 words/sec (200 ms each)
    if (i >= words.length) {
      clearInterval(quoteTimer); quoteTimer = null;
      if (q.author) { aEl.textContent = '— ' + q.author; aEl.style.opacity = '0.5'; } // fade author in
      return;
    }
    tEl.textContent += (i ? ' ' : '') + words[i++];
  }, 200);
}

// One screen for every "waiting for a tile" moment: pre-game, governor queue,
// the deliberate reload delay, and the between-pieces pause. Shows a fresh quote
// and (optionally) a countdown that calls onDone when it reaches 0.
function showWait(title, msg, seconds, onDone) {
  const screen = document.getElementById('waiting-screen');
  const wasShown = screen.classList.contains('show');
  clearInterval(waitTimer); waitTimer = null;
  document.getElementById('waitingTitle').textContent = title;
  document.getElementById('waitingMsg').innerHTML = msg || '';
  const countEl = document.getElementById('waitCount');
  if (!wasShown) paintQuote();   // pick a quote only when the screen first appears — don't rotate while waiting
  screen.classList.add('show');
  setBusy(true);
  if (seconds > 0) {
    let rem = Math.ceil(seconds);
    countEl.textContent = rem;
    waitTimer = setInterval(() => {
      rem--;
      if (rem > 0) { countEl.textContent = rem; }
      else {
        clearInterval(waitTimer); waitTimer = null;
        countEl.textContent = '';
        hideWait();
        if (onDone) onDone();
      }
    }, 1000);
  } else {
    countEl.textContent = '';
  }
}
function hideWait() {
  clearInterval(waitTimer); waitTimer = null;
  clearInterval(quoteTimer); quoteTimer = null;
  document.getElementById('waiting-screen').classList.remove('show');
}

// Actually show a tile and unlock drawing (extracted so the deliberate-load hold
// can call it after the countdown).
function revealTile(m) {
  hideWait();
  startedDrawing = true;  // from here on, wait screens are quote-free (mid-game)
  similarityRetries = 0; // fresh tile — reset retry counter
  tileReceivedAt = Date.now();
  tileId = m.tileId; setBusy(false); clearDraw(); ghostClear(); updateTileUI();

  // Solid black tile: warn the player to fill it completely, then let them draw normally.
  const hint = document.getElementById('hint');
  hint.textContent = m.fill === 0
    ? '⬛ This piece is fully black — scribble it all in!'
    : ghostMode === 'immediate'
      ? '✏️ Trace the image on the canvas below'
      : '✏️ Copy this image on the canvas below';

  const img = new Image();
  img.onload = () => {
    curRef = img; drawRef(img);
    document.getElementById('ghost').style.backgroundImage = `url(${img.src})`;
    if (ghostMode === 'immediate') setGhostOpacity(0.40);
  };
  img.src = m.refUrl + '?t=' + Date.now();
}
function setBootMsg(t) { const el = document.getElementById('bootMsg'); if (el) el.textContent = t; }
function dismissBoot() {
  if (connectWatchdog) { clearTimeout(connectWatchdog); connectWatchdog = null; }
  reconnectAttempts = 0;
  const b = document.getElementById('boot');
  if (b) { b.style.transition = 'opacity .3s'; b.style.opacity = '0'; setTimeout(() => b.remove(), 320); }
}

function connect() {
  // drop any half-open previous socket so its handlers can't double-fire
  if (ws) { try { ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null; ws.close(); } catch (e) {} }
  if (reconnectAttempts > 0) setBootMsg('Reconnecting…');
  connectStart = Date.now();   // for the deliberate first-tile delay
  firstTile = true;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?role=player`);

  // ── nerdy boot HUD ─────────────────────────────────────────────────────────
  // Live per-phase connect readout on the boot screen (page / TLS / ws-socket /
  // server) + a precise [conn] line to the console. Doubles as diagnostics: if a
  // join is ever slow again you can see exactly which phase hangs.
  const tConnectStart = performance.now();
  let _wsOpenAt = 0, _firstMsgLogged = false;
  const _nav = performance.getEntriesByType ? performance.getEntriesByType('navigation')[0] : null;
  const _pageMs = _nav ? Math.round(_nav.responseEnd - _nav.startTime) : -1;
  const _tlsMs  = _nav && _nav.secureConnectionStart ? Math.round(_nav.connectEnd - _nav.secureConnectionStart) : -1;
  const _fmt = ms => ms < 0 ? '—' : (ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms');
  function _hud(done) {
    const el = document.getElementById('bootMsg');
    if (!el) return;
    const now = performance.now();
    const sockMs = _wsOpenAt ? Math.round(_wsOpenAt - tConnectStart) : Math.round(now - tConnectStart);
    const srvMs  = _wsOpenAt ? Math.round(now - _wsOpenAt) : 0;
    const row = (ok, label, val, sub) =>
      `<div>[${ok ? '✓' : '·'}] ${label.padEnd(9)} ${val}${sub ? ' <span style="opacity:.55">' + sub + '</span>' : ''}</div>`;
    el.innerHTML =
      `<div style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.7;text-align:left;white-space:pre;opacity:.9">`
      + `<div style="opacity:.7">${done ? 'crowd-canvas online ✓' : 'booting crowd-canvas…'}</div>`
      + row(true, 'page', _fmt(_pageMs), 'tls ' + _fmt(_tlsMs))
      + row(!!_wsOpenAt, 'ws socket', _fmt(sockMs) + (_wsOpenAt || done ? '' : ' …'))
      + row(done, 'server', _wsOpenAt ? _fmt(srvMs) + (done ? '' : ' …') : '—')
      + `</div>`;
  }
  if (window._connTick) clearInterval(window._connTick);
  window._connTick = setInterval(() => {
    if (!document.getElementById('boot')) { clearInterval(window._connTick); return; }
    _hud(false);
  }, 100);
  _hud(false);
  ws.onopen = () => { _wsOpenAt = performance.now(); _hud(false); };

  // Connect watchdog: a socket can OPEN but never receive a first message when the
  // server is saturated and can't service the connection. Without this, the player
  // is stuck on the black boot screen forever. If nothing arrives within 25s, tear it
  // down so onclose schedules a retry instead of hanging.
  // NOTE: 25s (not 8s) — under a real connection storm the TLS+WS handshake can take
  // 10-20s while still succeeding. An 8s watchdog made phones bail on a working
  // connection and reconnect, amplifying the storm. See HANDOFF_JAN.md §3.1.
  if (connectWatchdog) clearTimeout(connectWatchdog);
  connectWatchdog = setTimeout(() => {
    setBootMsg('Almost there — it’s very busy right now. Keep this screen open…');
    try { ws.close(); } catch (e) {}   // → onclose → reconnect with backoff
  }, 25000);

  ws.onmessage = ev => {
    if (!_firstMsgLogged) {
      _firstMsgLogged = true;
      if (window._connTick) clearInterval(window._connTick);
      const wsOpenMs   = _wsOpenAt ? Math.round(_wsOpenAt - tConnectStart) : -1;
      const firstMsgMs = _wsOpenAt ? Math.round(performance.now() - _wsOpenAt) : -1;
      const totalMs    = Math.round(performance.now() - tConnectStart);
      _hud(true); // flash the completed boot HUD during the fade-out (no added delay)
      console.log(`[conn] page=${_pageMs}ms tls=${_tlsMs}ms ws-open=${wsOpenMs}ms first-msg=${firstMsgMs}ms total=${totalMs}ms`);
    }
    dismissBoot();
    const m = JSON.parse(ev.data);
    if (m.type === 'done') {
      showDone();
    } else if (m.type === 'resume') {
      // admin reopened the game — leave the done screen and rejoin (staggered),
      // treated like a fresh join so the deliberate load screen plays again.
      document.getElementById('done').classList.remove('show');
      hideWait();
      firstTile = true; connectStart = Date.now();
      setTimeout(() => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' })); }, Math.random() * 2000);
    } else if (m.type === 'waiting') {
      showWait('Get ready!', 'The game starts soon.<br>Keep this screen open.', 0);
      // retry every 3s in case the open signal was missed (quote stays put)
      setTimeout(function retry() {
        if (!document.getElementById('waiting-screen').classList.contains('show')) return;
        if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' }));
        setTimeout(retry, 3000);
      }, 3000);
    } else if (m.type === 'config') {
      applyConfig(m);
    } else if (m.type === 'rate-limited') {
      showWait('Easy there!', 'Lining up your next piece…', m.seconds,
        () => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' })); });
    } else if (m.type === 'tile') {
      // Deliberate load: hold the FIRST tile of a connection behind the load screen
      // so connect→first-tile is always ≥ deliberateMs(). A reload on an idle server
      // gets no head start; time already spent queued counts toward it.
      if (firstTile) {
        firstTile = false;
        const remaining = deliberateMs() - (Date.now() - connectStart);
        if (remaining > 600) {
          pendingTile = m;
          showWait('Loading your piece…', 'Sharpen your pencil!', remaining / 1000,
            () => { const t = pendingTile; pendingTile = null; if (t) revealTile(t); });
          return;
        }
      }
      revealTile(m);
    } else if (m.type === 'wait') {
      // Server briefly at capacity (render queue busy) — same load screen.
      showWait('Almost there!', 'Finding you a piece to draw…<br>Keep this screen open.', 0);
      setTimeout(() => ws && ws.readyState === 1 && ws.send(JSON.stringify({ type: 'next' })), 2000);
    } else if (m.type === 'accepted') {
      // Submission accepted — same load screen for the rate-limit pause, then auto
      // next. Keeps a reload and normal between-piece timing identical.
      if (m.rateLimitSeconds > 0) {
        showWait('Nice one!', 'Next piece coming up…', m.rateLimitSeconds,
          () => { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' })); });
      } else {
        setTimeout(() => {
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' }));
        }, 900);
      }
    } else if (m.type === 'rejected') {
      // Server rejected (rate limit bypass attempt) — just unlock so player can retry
      setBusy(false);
    }
  };
  ws.onclose = () => {
    if (connectWatchdog) { clearTimeout(connectWatchdog); connectWatchdog = null; }
    // Backoff with jitter so a roomful of phones doesn't reconnect in lockstep
    // and recreate the very connection storm we're trying to ride out.
    const delay = Math.min(5000, 600 * Math.pow(1.6, Math.min(reconnectAttempts, 5))) + Math.random() * 1200;
    reconnectAttempts++;
    setTimeout(connect, delay);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
}

function showDone() {
  hideWait();
  document.getElementById('done').classList.add('show');
  tileId = null;
  updateTileUI();
  loadDoneThumb();
}

function loadDoneThumb() {
  const t   = '?t=' + Date.now();
  const img = document.getElementById('finalThumb');
  const lnk = document.getElementById('finalLink');
  lnk.href  = '/api/export.png' + t;
  img.onerror = () => {
    // Image still building on the server — retry every 3 s until it appears
    setTimeout(loadDoneThumb, 3000);
  };
  img.src = '/api/export-thumb.png' + t;
}

function applyConfig(cfg) {
  if (cfg.inkColor)    { INK = cfg.inkColor;  document.documentElement.style.setProperty('--ink', INK); paintPaper(); }
  if (cfg.paperColor)  { PAPER = cfg.paperColor; document.documentElement.style.setProperty('--paper', PAPER); paintPaper(); }
  // canvasColor intentionally ignored — player background is fixed black.
  if (cfg.sendColor)     { SEND = cfg.sendColor; document.documentElement.style.setProperty('--send', SEND); }
  if (cfg.btnClearColor) document.documentElement.style.setProperty('--btn-clear', cfg.btnClearColor);
  if (cfg.btnNextColor)  document.documentElement.style.setProperty('--btn-next', cfg.btnNextColor);
  if (cfg.similarityThreshold !== undefined) simThreshold = cfg.similarityThreshold;
  if (cfg.maxStrayInk !== undefined) maxStrayInk = cfg.maxStrayInk;
  if (cfg.minCoverage !== undefined) minCoverage = cfg.minCoverage;
  if (cfg.rateLimit   !== undefined) rateLimit   = cfg.rateLimit;
  if (cfg.ghostMode   !== undefined) {
    ghostMode = cfg.ghostMode;
    document.getElementById('main').classList.toggle('centered', ghostMode === 'immediate');
  }
}

// ── similarity check — multi-scale soft IoU ───────────────────────────────────
// Score = weighted average of soft IoU at 3 resolutions.
//   inter = sum(min(ref_dark, draw_dark))  — pixels both images agree have ink
//   union = sum(max(ref_dark, draw_dark))  — pixels either image has ink
//   IoU   = inter / union                  — fraction of the ink union that overlaps
//
// Extra guardrails:
//   recall    = how much of the original ink was covered
//   precision = how much of the player ink belongs on the original
//   inkRatio  = avoids passing drawings that are much too empty or much too full
//
// Multi-scale: 8×8 catches wrong position; 32×32 catches coverage and detail.
// The final score remains 0-1, so admin's threshold still maps directly to %.

function getSimilarityScore() {
  if (!curRef || !tileId) return { score: 1, label: 'strong', ok: true, blank: false }; // no ref/tile → nothing to compare

  const SCALES  = [8, 16, 32];
  const WEIGHTS = [0.20, 0.30, 0.50]; // more weight on finer scales

  const off = Object.assign(document.createElement('canvas'), { width: 1, height: 1 });
  const oc  = off.getContext('2d');
  let score = 0, recallScore = 0, precisionScore = 0, inkRatioScore = 0, deepWhiteSpill = 0, drawDarkCells = 0;

  for (let si = 0; si < SCALES.length; si++) {
    const S = SCALES[si];
    off.width = S; off.height = S;

    oc.drawImage(refC, 0, 0, S, S);
    const rd = oc.getImageData(0, 0, S, S).data;

    oc.fillStyle = '#ffffff'; oc.fillRect(0, 0, S, S);
    oc.drawImage(paperC, bleedPx * dpr, bleedPx * dpr, tileSide * dpr, tileSide * dpr, 0, 0, S, S);
    oc.drawImage(drawC,  bleedPx * dpr, bleedPx * dpr, tileSide * dpr, tileSide * dpr, 0, 0, S, S);
    const dd = oc.getImageData(0, 0, S, S).data;

    // per-cell darkness for reference (R) and player drawing (D)
    const R = new Float64Array(S * S);
    const D = new Float64Array(S * S);
    for (let i = 0; i < S * S; i++) {
      const p = i * 4;
      R[i] = 1 - (rd[p] + rd[p+1] + rd[p+2]) / (3 * 255); // 0=white 1=black
      D[i] = 1 - (dd[p] + dd[p+1] + dd[p+2]) / (3 * 255);
      // mirror the old server blank test: count cells the player actually inked
      if (S === 32 && D[i] > 0.137) drawDarkCells++; // dD>0.137 ≙ grayscale <220
    }

    // Brush tolerance: on SPARSE tiles only (little black), dilate the reference by
    // ~1 brush radius at the fine scale so tracing a thin line with the thick brush
    // reads as a match instead of "over-painting". Dense tiles are left untouched,
    // so anti-tag behaviour is unchanged. Recall (coverage) always uses the original
    // reference, and tags in empty areas stay far from the line → still rejected.
    let Rd = R;
    if (S === 32) {
      let frac = 0; for (let i = 0; i < S * S; i++) frac += R[i];
      if (frac / (S * S) < 0.12) { // sparse tile
        Rd = new Float64Array(S * S);
        for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
          let m = 0;
          for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
            const nx = x + dx, ny = y + dy;
            if (nx < 0 || ny < 0 || nx >= S || ny >= S) continue;
            const v = R[ny * S + nx]; if (v > m) m = v;
          }
          Rd[y * S + x] = m;
        }
      }
    }

    let inter = 0, interTol = 0, unionTol = 0, refInk = 0, refInkDil = 0, drawInk = 0;
    for (let i = 0; i < S * S; i++) {
      inter    += Math.min(R[i],  D[i]);   // overlap vs original ref (for coverage)
      interTol += Math.min(Rd[i], D[i]);   // overlap vs tolerant ref (for shape match)
      unionTol += Math.max(Rd[i], D[i]);
      refInk    += R[i];
      refInkDil += Rd[i];
      drawInk   += D[i];
    }

    // blank ref at this scale (both images nearly white) → free pass for this scale
    if (unionTol < 0.5) {
      score += WEIGHTS[si];
      recallScore += WEIGHTS[si];
      precisionScore += WEIGHTS[si];
      inkRatioScore += WEIGHTS[si];
      if (S === 32) deepWhiteSpill = measureDeepWhiteSpill(rd, dd, S);
      continue;
    }

    score += WEIGHTS[si] * (interTol / unionTol);
    recallScore += WEIGHTS[si] * (refInk > 0.5 ? inter / refInk : 1); // coverage: original reference
    precisionScore += WEIGHTS[si] * (drawInk > 0.5 ? interTol / drawInk : 0);

    const inkRatio = drawInk / Math.max(0.5, refInkDil);
    inkRatioScore += WEIGHTS[si] * Math.min(1, inkRatio, 1 / inkRatio);
    if (S === 32) deepWhiteSpill = measureDeepWhiteSpill(rd, dd, S);
  }

  // Blend overlap with coverage, correctness and ink amount. IoU remains dominant;
  // the other factors stop scribbles and tiny partial copies from scoring too well.
  const shapeScore = clamp01(
    score * 0.58 +
    recallScore * 0.18 +
    precisionScore * 0.16 +
    inkRatioScore * 0.08
  );

  // Stray marks in deep-white areas are an absolute penalty. This prevents tiny
  // symbols from being diluted by large legitimate dark regions in the tile.
  const spillOver = Math.max(0, deepWhiteSpill - maxStrayInk);
  const cleanliness = maxStrayInk > 0
    ? clamp01(1 - spillOver / (maxStrayInk * 1.75))
    : (deepWhiteSpill > 0 ? 0 : 1);
  // Match % = how much of the black you covered (recall), knocked down if you inked the
  // white (cleanliness). Coverage is naturally ~100% for an honest trace on ANY tile —
  // dense or sparse — and ~0 for a doodle, so this reads consistently and can't be
  // inflated the way an IoU-based score gets inflated on low-detail tiles. Shape fidelity
  // is still enforced: recall makes you cover the black, cleanliness makes you avoid white.
  const finalScore = clamp01(recallScore * cleanliness);

  // blank = essentially nothing drawn (same intent as the old server-side check,
  // <0.5% inked). Enforced regardless of the similarity threshold.
  const blank = drawDarkCells < 6;

  const result = classifySimilarity(finalScore, {
    overlap: score,
    recall: recallScore,
    precision: precisionScore,
    inkRatio: inkRatioScore,
    spill: deepWhiteSpill,
    shapeScore
  });
  result.blank = blank;
  return result;
}

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function measureDeepWhiteSpill(refData, drawData, size) {
  const halo = 2;
  let spill = 0;

  function darkAt(data, x, y) {
    const p = (y * size + x) * 4;
    return 1 - (data[p] + data[p+1] + data[p+2]) / (3 * 255);
  }

  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (darkAt(refData, x, y) > 0.15) continue;

      let nearInk = false;
      for (let dy = -halo; dy <= halo && !nearInk; dy++) {
        for (let dx = -halo; dx <= halo; dx++) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;
          if (darkAt(refData, nx, ny) > 0.25) { nearInk = true; break; }
        }
      }
      if (nearInk) continue;

      spill += darkAt(drawData, x, y);
    }
  }

  return spill;
}

function classifySimilarity(score, details) {
  // Coverage is a hard floor that applies even when the similarity score is "off":
  // the player must overlap at least minCoverage of the reference's ink.
  const coveredEnough = minCoverage <= 0 || details.recall >= minCoverage;

  if (simThreshold === 0) {
    if (!coveredEnough) return { score, label: 'partial', ok: false, details };
    return { score, label: 'strong', ok: true, details };
  }

  const weakLimit = Math.max(0.10, simThreshold * 0.55);
  const strongLimit = Math.min(0.92, Math.max(simThreshold + 0.22, 0.68));
  const cleanEnough = details.spill <= maxStrayInk;

  // For stray rejection, show the shape score as the displayed %, not the
  // cleanliness-penalised final score.  The player may have traced the shape
  // well — showing 0% because of a few stray marks feels unfair.
  if (!cleanEnough) return { score: details.shapeScore, label: 'stray', ok: false, details };
  if (!coveredEnough) return { score, label: 'partial', ok: false, details };
  if (score < weakLimit) return { score, label: 'none', ok: false, details };
  if (score < simThreshold) return { score, label: 'weak', ok: false, details };
  if (score >= strongLimit) return { score, label: 'strong', ok: true, details };
  return { score, label: 'match', ok: true, details };
}

function similarityLabelText(label) {
  return ({
    stray: 'Ink outside shape',
    none: 'No match',
    partial: 'Cover more',
    weak: 'Weak match',
    match: 'Match',
    strong: 'Strong match'
  })[label] || 'Match';
}

// ── ghost opacity helpers ─────────────────────────────────────────────────────
function setGhostOpacity(v) {
  document.getElementById('ghost').style.opacity = v;
}
function ghostFail() { setGhostOpacity(0.40); }

// hide opacity only — keeps the image (used when retrying the same tile)
function ghostHide() {
  const ghost = document.getElementById('ghost');
  ghost.style.transition = 'none';
  void ghost.offsetHeight;
  ghost.style.opacity = 0;
  requestAnimationFrame(() => { ghost.style.transition = ''; });
}

// hide + wipe image (used when moving to a new tile)
function ghostClear() {
  const ghost = document.getElementById('ghost');
  ghost.style.transition = 'none';
  ghost.style.backgroundImage = 'none';
  void ghost.offsetHeight;
  ghost.style.opacity = 0;
  requestAnimationFrame(() => { ghost.style.transition = ''; });
}


function updateTileUI() {
  const hasTile = !!tileId;
  document.getElementById('retrievingOverlay').classList.toggle('hidden', hasTile);
  document.getElementById('refCard').classList.toggle('dim', !hasTile);
  document.getElementById('refCard').style.display = ghostMode === 'immediate' ? 'none' : '';
  document.getElementById('clearBtn').disabled = !hasTile;
  document.getElementById('buttons').style.opacity = hasTile ? '' : '0.4';
}

function setBusy(b) {
  document.getElementById('submitBtn').disabled = b;
  document.getElementById('nextBtn').disabled = b;
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}

document.getElementById('clearBtn').addEventListener('click', clearDraw);
let nextCooldownTimer = null;
document.getElementById('nextBtn').addEventListener('click', () => {
  if (!ws || ws.readyState !== 1) return;
  if (nextCooldownTimer) return;
  if (rateLimitTimer) { clearInterval(rateLimitTimer); rateLimitTimer = null; }
  tileId = null; updateTileUI(); setBusy(true);
  ws.send(JSON.stringify({ type: 'next' }));
  const btn = document.getElementById('nextBtn');
  btn.classList.add('cooling');
  nextCooldownTimer = setTimeout(() => {
    nextCooldownTimer = null;
    btn.classList.remove('cooling');
  }, 5000);
});
function showResultFlash(result, callback) {
  const el = document.getElementById('resultFlash');
  const pct = Math.round(result.score * 100);
  el.innerHTML = `<span class="rf-icon">${result.ok ? '✓' : '✗'}</span><span class="rf-pct">${pct}%</span><span class="rf-label">${similarityLabelText(result.label)}</span>`;
  el.className = result.ok ? 'ok' : 'fail';
  // Wait for flash to fully fade (900ms display + 150ms CSS transition) before callback,
  // so the toast never appears simultaneously with the flash.
  setTimeout(() => { el.className = ''; el.innerHTML = ''; }, 900);
  setTimeout(() => { if (callback) callback(); }, 1060);
}

document.getElementById('submitBtn').addEventListener('click', () => {
  if (!tileId || !ws || ws.readyState !== 1) return;
  setBusy(true);
  const result = getSimilarityScore();
  if (result.blank) { // nothing meaningful drawn — same intent as the old server blank reject
    setBusy(false);
    return;
  }
  showResultFlash(result, () => {
    if (result.label === 'partial') {
      ghostFail();
      setBusy(false);
      return;
    }
    if (!result.ok) {
      similarityRetries++;
      if (similarityRetries <= 1) {
        // first failure: always free retry, server will rate-limit if they submit too fast
        clearDraw();
        ghostHide();
        ghostFail();
        setBusy(false);
      } else {
        // second failure: move to next tile, apply rate limit if needed
        if (!maybeShowRateLimit()) {
          setTimeout(() => {
            if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'next' }));
          }, 1800);
        }
      }
      return;
    }
    ws.send(JSON.stringify({ type: 'submit', tileId, png: buildSubmitCanvas().toDataURL('image/png') }));
  });
});

document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
// prevent pinch zoom (2+ fingers)
document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
// prevent double-tap zoom
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });
window.addEventListener('resize', () => requestAnimationFrame(setup));
window.addEventListener('load',   () => requestAnimationFrame(() => {
  setup(); updateTileUI();
  setTimeout(connect, Math.random() * 500); // small jitter to avoid lockstep reconnects
}));
</script>
</body>
</html>
