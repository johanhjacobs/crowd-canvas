<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crowd Canvas — live</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; }

  /* ── canvas area ─────────────────────────────── */
  /* base state = sidebar visible: a slight frame around the picture */
  #canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 14px; min-width: 0; background: #000;
  }
  #canvas-border {
    border: 2px solid rgba(255,255,255,0.22);
    padding: 6px; display: inline-flex;
    box-shadow: 0 0 40px rgba(255,255,255,0.06);
  }
  /* full screen (no sidebar): picture fills everything, no frame at all */
  body.no-sidebar #canvas-wrap { padding: 0; }
  body.no-sidebar #canvas-border { border: none; padding: 0; box-shadow: none; }
  canvas { display: block; image-rendering: pixelated; background: #000; }

  /* ── sidebar ─────────────────────────────────── */
  #sidebar {
    width: 27%; min-width: 120px; max-width: none;
    container-type: inline-size;            /* icons + numbers scale to sidebar width */
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    padding: 20px 14px;
    border-left: 1px solid rgba(255,255,255,0.12);
    font-family: system-ui, -apple-system, sans-serif; color: #fff;
  }
  #sidebar.hidden { display: none; }

  #qr-wrap img { width: 100%; max-width: 270px; display: block; border-radius: 8px; }

  .stat { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .stat-icon {
    width: 69px; height: 69px; display: block; opacity: .9;         /* fallback */
    width: clamp(28px, 26cqw, 120px); height: clamp(28px, 26cqw, 120px);
  }
  .stat-val {
    font-weight: 700; line-height: 1; letter-spacing: -.03em;
    white-space: nowrap; font-variant-numeric: tabular-nums;        /* steady digit width */
    font-size: 78px;                                                /* fallback */
    /* 22cqw keeps 5 digits ("99999") inside the sidebar at any width */
    font-size: clamp(24px, 22cqw, 180px);
  }

  /* colors applied dynamically via applyViewColors() */

  /* ── overlays ────────────────────────────────── */
  #veil { position: fixed; inset: 0; background: #000; display: none; z-index: 10; }
  #veil.on { display: block; }
</style>
</head>
<body>

<div id="canvas-wrap">
  <div id="canvas-border">
    <canvas id="c"></canvas>
  </div>
</div>

<div id="sidebar" class="hidden">
  <div id="qr-wrap">
    <img id="qr-img" src="" alt="Scan to join">
  </div>
  <div class="stat">
    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-label="players">
      <circle cx="9" cy="7.5" r="3.2"/>
      <path d="M3.5 19.5c0-3 2.5-5.2 5.5-5.2s5.5 2.2 5.5 5.2"/>
      <path d="M16 4.7a3 3 0 0 1 0 5.8"/>
      <path d="M17.6 14.6c2.2.6 3.7 2.4 3.7 4.9"/>
    </svg>
    <div class="stat-val" id="stat-players">0</div>
  </div>
  <div class="stat">
    <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-label="complete">
      <circle cx="12" cy="12" r="9"/>
      <path d="M8 12.4l2.6 2.6 5.4-5.8"/>
    </svg>
    <div class="stat-val" id="stat-pct">0%</div>
  </div>
</div>

<div id="veil"></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const sidebar = document.getElementById('sidebar');

let bgFill = '#000000', textFill = '#ffffff', tileFill = '#000000';
let inkFill = '#000000', paperFill = '#ffffff';

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

// Remap greyscale tile pixels: 0 (dark) → inkFill, 255 (bright) → paperFill.
// Transparent pixels (empty-tile areas in the seed) are left as-is.
// Returns the original img unchanged when ink/paper are the defaults.
function colorize(img, w, h) {
  if (inkFill === '#000000' && paperFill === '#ffffff') return img;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d');
  cx.drawImage(img, 0, 0, w, h);
  const id = cx.getImageData(0, 0, w, h);
  const d = id.data;
  const [ir, ig, ib] = hexToRgb(inkFill);
  const [pr, pg, pb] = hexToRgb(paperFill);
  for (let i = 0; i < d.length; i += 4) {
    if (d[i+3] === 0) continue;          // transparent = empty tile area in seed
    const t = d[i] / 255;                // 0 = darkest ink, 1 = brightest paper
    d[i]   = (ir + (pr - ir) * t + 0.5) | 0;
    d[i+1] = (ig + (pg - ig) * t + 0.5) | 0;
    d[i+2] = (ib + (pb - ib) * t + 0.5) | 0;
  }
  cx.putImageData(id, 0, 0);
  return c;
}

function applyViewColors(bg, text, tile, ink, paper, { reseed = true } = {}) {
  bgFill = bg; textFill = text; tileFill = tile || bg;
  inkFill = ink || '#000000'; paperFill = paper || '#ffffff';
  document.body.style.background = bg;
  document.getElementById('canvas-wrap').style.background = bg;
  document.getElementById('veil').style.background = bg;
  canvas.style.background = tileFill;
  sidebar.style.color = text;
  sidebar.style.borderLeftColor = text + '1f';
  document.getElementById('canvas-border').style.borderColor = text + '38';
  document.getElementById('canvas-border').style.boxShadow = `0 0 40px ${text}0f`;
  ctx.fillStyle = tileFill;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (lastSeedImg) {
    ctx.drawImage(colorize(lastSeedImg, canvas.width, canvas.height), 0, 0, canvas.width, canvas.height);
    // repaint tile-update overlays (drawn after the seed was loaded)
    for (const [, e] of tiles) {
      if (e.img) ctx.drawImage(colorize(e.img, e.sz, e.sz), e.x, e.y, e.sz, e.sz);
    }
  } else if (reseed && canvas.width > 0) {
    seedFromServer();
  }
  if (!sidebar.classList.contains('hidden')) refreshQR();
}

let imgW = 1024, imgH = 1024;
const tiles = new Map();
let lastSeedImg = null; // keep the last loaded seed image so resize never re-fetches

function seedFromServer() {
  const img = new Image();
  img.onload = () => {
    lastSeedImg = img;
    ctx.drawImage(colorize(img, canvas.width, canvas.height), 0, 0, canvas.width, canvas.height);
  };
  const tok = window._AT ? '&token=' + window._AT : '';
  img.src = '/api/seed.png?t=' + Date.now() + tok;
}

function resize() {
  const hasSidebar = !sidebar.classList.contains('hidden');
  const sideW = hasSidebar ? sidebar.offsetWidth : 0;
  const chrome = hasSidebar ? (14 + 6 + 2) * 2 : 0;
  const avW   = window.innerWidth  - sideW - chrome;
  const avH   = window.innerHeight - chrome;
  const aspect = imgW / imgH;
  let cssW, cssH;
  if (avW / avH > aspect) { cssH = avH; cssW = avH * aspect; }
  else                     { cssW = avW; cssH = avW / aspect; }
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  // Setting canvas.width clears the canvas — redraw from lastSeedImg immediately
  // so the screen is never blank during a window resize.
  canvas.width  = imgW;
  canvas.height = imgH;
  ctx.fillStyle = tileFill;
  ctx.fillRect(0, 0, imgW, imgH);
  if (lastSeedImg) {
    ctx.drawImage(colorize(lastSeedImg, imgW, imgH), 0, 0, imgW, imgH);
    for (const [, entry] of tiles) {
      if (entry.img) ctx.drawImage(colorize(entry.img, entry.sz, entry.sz), entry.x, entry.y, entry.sz, entry.sz);
    }
  } else if (imgW > 0) {
    seedFromServer();
  }
}

function paintTile(id, x, y, sz, png) {
  if (!tiles.has(id)) tiles.set(id, { x, y, sz, img: null });
  const entry = tiles.get(id);
  const img   = new Image();
  img.onload = () => {
    if (!tiles.has(id)) return;
    ctx.drawImage(colorize(img, sz, sz), x, y, sz, sz);
    entry.img = img; // store original for resize / re-colorize
  };
  img.src = png;
}

function hexLuminance(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000; // 0=black 255=white
}
function refreshQR() {
  const url = window.location.origin + '/';
  // Use actual bg/text colors for the QR so it always has contrast
  const qrColor   = textFill.replace('#','');
  const qrBgColor = bgFill.replace('#','');
  document.getElementById('qr-img').src =
    'https://api.qrserver.com/v1/create-qr-code/?data=' +
    encodeURIComponent(url) + '&size=300x300&color=' + qrColor + '&bgcolor=' + qrBgColor + '&margin=1';
}

function setSidebar(on) {
  sidebar.classList.toggle('hidden', !on);
  document.body.classList.toggle('no-sidebar', !on);
  if (on) refreshQR();
  resize();
}


// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?role=view`);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'auth', token: window._AT || '' }));
  ws.onmessage = ev => {
    const m = JSON.parse(ev.data);
    if (m.type === 'init' || m.type === 'reset') {
      tiles.clear();
      lastSeedImg = null; // new session — don't restore old mosaic
      applyViewColors(m.bgColor || '#000000', m.textColor || '#ffffff', m.tileColor || '#e0e0e0', m.inkColor || '#000000', m.paperColor || '#ffffff', { reseed: false });
      if (m.sidebarWidth) sidebar.style.width = m.sidebarWidth + '%';
      if (!m.active) { ctx.fillStyle=tileFill; ctx.fillRect(0,0,imgW,imgH); return; }
      imgW = m.imgW || m.size || 1024;
      imgH = m.imgH || m.size || 1024;
      canvas.width  = imgW;
      canvas.height = imgH;
      ctx.fillStyle = tileFill; ctx.fillRect(0, 0, imgW, imgH);
      resize();
      seedFromServer();
    }
    else if (m.type === 'tile-update') { paintTile(m.tileId, m.x, m.y, m.sz, m.png); }
    else if (m.type === 'tile-cleared') {
      tiles.delete(m.tileId);
      ctx.fillStyle = tileFill; ctx.fillRect(m.x, m.y, m.sz, m.sz);
    }
    else if (m.type === 'view-mode')   { document.getElementById('veil').classList.toggle('on', m.mode === 'paused'); }
    else if (m.type === 'view-sync')   {
      document.getElementById('veil').classList.remove('on');
      // Keep existing canvas visible while new seed loads.
      // Clear tile image refs — seed will be the new ground truth.
      tiles.clear();
      seedFromServer();
    }
    else if (m.type === 'view-sidebar') { setSidebar(m.on); }
    else if (m.type === 'view-colors') { applyViewColors(m.bg, m.text, m.tile, m.ink, m.paper); }
    else if (m.type === 'view-sidebar-width') { sidebar.style.width = m.width + '%'; resize(); }
    else if (m.type === 'stats') {
      document.getElementById('stat-players').textContent = m.players ?? '—';
      document.getElementById('stat-pct').textContent     = (m.coverage ?? 0) + '%';
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
  ws.onerror  = () => ws.close();
}

window.addEventListener('resize', resize);
window.addEventListener('load',   () => { document.body.classList.add('no-sidebar'); resize(); connect(); });
</script>
</body>
</html>
