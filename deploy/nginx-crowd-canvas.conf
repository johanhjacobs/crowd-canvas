limit_req_zone $binary_remote_addr zone=player:10m rate=1000r/s;

upstream app {
    server 127.0.0.1:3100;
    keepalive 512;
}

server {
    server_name asml.mmsparty.nl;

    gzip on;
    gzip_types application/json text/css application/javascript;
    gzip_min_length 1024;

    location = / {
        root /opt/crowd-canvas/public;
        try_files /player.html =404;
        expires 60s;
        add_header Cache-Control "public";
    }

    location /refs/ {
        alias /opt/crowd-canvas/data/refs/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    location /ws {
        limit_req zone=player burst=20000 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout  7200;
        proxy_send_timeout  7200;
    }

    location ~ -admin {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-canvas;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 30M;
    }

    listen [::]:443 ssl backlog=65535 ipv6only=on; # managed by Certbot
    listen 443 ssl backlog=65535; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/asml.mmsparty.nl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/asml.mmsparty.nl/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = asml.mmsparty.nl) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name asml.mmsparty.nl;
    return 404; # managed by Certbot


}
