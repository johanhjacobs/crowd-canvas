# /etc/nginx/sites-available/draw.yourdomain.com
# Symlink into sites-enabled, test, reload, then run certbot (see README).
# This block touches nothing about your other vhosts.

server {
    listen 80;
    listen [::]:80;
    server_name draw.yourdomain.com;

    # uploads can be a few MB; allow headroom
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade (the live mosaic + player sockets need this)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # keep idle player sockets alive during a long session
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# After `certbot --nginx -d draw.yourdomain.com` runs, it rewrites this file to
# add the listen 443 ssl block, the certificate paths, and an http->https redirect.
