# /etc/nginx/sites-available/draw.yourdomain.com
# Symlink into sites-enabled, test, reload, then run certbot (see README).
# This block touches nothing about your other vhosts.

server {
    listen 80;
    listen [::]:80;
    server_name draw.yourdomain.com;

    # uploads can be a few MB; allow headroom
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade (players, public view screen, and the admin control socket use /ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # keep idle player sockets alive during a long session
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional defense-in-depth for the admin page shell.
    # ADMIN_TOKEN in the app still protects the admin APIs and admin websocket.
    # location = /dropveters-admin {
    #     auth_basic "Crowd Canvas admin";
    #     auth_basic_user_file /etc/nginx/.htpasswd-canvas;
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}

# After `certbot --nginx -d draw.yourdomain.com` runs, it rewrites this file to
# add the listen 443 ssl block, the certificate paths, and an http->https redirect.
#
# Public paths typically proxied through nginx:
#   /                    player page
#   /dropveters-view     public projector page
#   /dropveters-admin    admin page shell
#   /ws                  websocket endpoint
#   /refs/               tile reference images
#   /api/seed.png
#   /api/live-tile/*.png
#   /api/final-view.png
#   /api/final-view-thumb.png
#
# ADMIN_TOKEN should be set in the app environment before exposing the site publicly.
